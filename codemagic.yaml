workflows:
  android:
    name: 'Android'
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      groups:
        - qbot
    scripts:
      - name: 'Setup keystore'
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_KEYSTORE_PATH
      - name: Installing Bun
        script: |
          curl -fsSL https://bun.sh/install | zsh
          export BUN_INSTALL="$HOME/.bun" 
          export PATH="$BUN_INSTALL/bin:$PATH"
          source $HOME/.zshrc
      - name: Installing packages & dependencies
        script: |
          bun install
          bun ci
          cvm install 9.0.0
          cvm use 9.0.0
      - name: 'Running Vite Build'
        script: |
          bun run build
      - name: 'Moving to build directory'
        script: |
          cd build
      - name: 'Installing Cordova SDK'
        script: |
          bun install cordova@latest
      - name: 'Setup Android CordovaSDK project...'
        script: |
          cordova platform remove android --no-save
          cordova platform add android \
          --confirm \
          --no-interactive \
          --noresources
      - name: 'Building Android app'
        script: cordova build android
      - name: 'Signing APK'
        script: |
          APK_PATH=$(find platforms/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          jarsigner \
          -sigalg SHA1withRSA \
          -digestalg SHA1 \
          -keystore $CM_KEYSTORE_PATH \
          -storepass $CM_KEYSTORE_PASSWORD \
          -keypass $CM_KEY_PASSWORD \
          $APK_PATH $CM_KEY_ALIAS
    artifacts:
      - platforms/android/app/build/outputs/**/*.apk
