workflows:
  android:
    name: 'Android'
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      groups:
        - qbot
    scripts:
      - name: 'Setup keystore'
        script: |
          echo $CM_KEYSTORE | base64 --decode > $CM_KEYSTORE_PATH
      - name: Installing Bun
        script: |
          curl -fsSL https://bun.sh/install | bash
      - name: Running Bun scripts
        script: |
          echo 'export BUN_INSTALL="$HOME/.bun"
          export PATH="$BUN_INSTALL/bin:$PATH"' >> $HOME/.zshrc
          source $HOME/.zshrc
      - name: Installing packages & dependencies
        script: |
          npm install
          echo '# Drizzle
                DATABASE_URL=file:local.db

                ORIGIN="http://localhost:5173"

                # Better Auth
                # For production use 32 characters and generated with high entropy
                # https://www.better-auth.com/docs/installation
                BETTER_AUTH_SECRET="bcc0fe70-f17f-4b35-b894-6404fa698428"
                # GitHub OAuth
                # https://www.better-auth.com/docs/authentication/github
                GITHUB_CLIENT_ID=""
                GITHUB_CLIENT_SECRET=""' >> .env
      - name: 'Running Vite Build'
        script: |
          npx vite build
      - name: 'Installing Cordova SDK'
        script: |
          cd build
          npm install
          npm ci
          cvm install 9.0.0
          cvm use 9.0.0
      - name: 'Setup Android CordovaSDK project'
        script: |
          cordova platform remove android --no-save
          cordova platform add android \
          --confirm \
          --no-interactive \
          --noresources
      - name: 'Building Android app'
        script: cordova build android
      - name: 'Signing APK'
        script: |
          APK_PATH=$(find platforms/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          jarsigner \
          -sigalg SHA1withRSA \
          -digestalg SHA1 \
          -keystore $CM_KEYSTORE_PATH \
          -storepass $CM_KEYSTORE_PASSWORD \
          -keypass $CM_KEY_PASSWORD \
          $APK_PATH $CM_KEY_ALIAS
    artifacts:
      - platforms/android/app/build/outputs/**/*.apk
